services:
    app:
        build:
            context: ../..
            dockerfile: docker/dev/Dockerfile
        ports:
            - "${PORT}:${PORT}"
        environment:
            PORT: ${PORT}
            DB_HOST: postgres
            DB_PORT: ${DB_PORT}
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
            ADMIN_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/minuseek_admin
            TENANT_DATABASE_URL_TEMPLATE: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/{db}
            ORIGIN: ${ORIGIN}
            FRONT_ORIGIN: ${FRONT_ORIGIN}
            KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL}
            KEYCLOAK_INTERNAL_URL: http://keycloak:8080
            KEYCLOAK_SYSTEM_REALM: ${KEYCLOAK_SYSTEM_REALM}
            KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
            KEYCLOAK_ISSUER_HOST_CHECK: ${KEYCLOAK_ISSUER_HOST_CHECK:-lax}
            KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-minuseek-provisioner}
            KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
            MOBILE_ALLOW_EXPO_GO: ${MOBILE_ALLOW_EXPO_GO:-true}
            KEYCLOAK_REALM_SSL_REQUIRED: none
            STORAGE_DRIVER: ${STORAGE_DRIVER}
            GCS_BUCKET: ${GCS_BUCKET}
            GCS_SIGNED_URL_TTL_SECONDS: ${GCS_SIGNED_URL_TTL_SECONDS}
            DATA_API_URL: ${DATA_API_URL}
            GOOGLE_APPLICATION_CREDENTIALS: /gcloud/adc.json
        volumes:
            - ../../app/prisma:/app/prisma
            - ../../app/prisma-admin:/app/prisma-admin
            - ../../app/scripts:/app/scripts
            - ../../app/generated:/app/generated
            - ${GCLOUD_ADC:-~/.config/gcloud-minuseek/application_default_credentials.json}:/gcloud/adc.json:ro
        networks:
            - default
            - minuseek
        depends_on:
            postgres:
                condition: service_healthy
        develop:
            watch:
                - action: sync
                  path: ../../app/src
                  target: /app/src
                - action: rebuild
                  path: ../../app/package.json
                - action: rebuild
                  path: ../../app/pnpm-lock.yaml

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ../../keycloak/dev:/opt/keycloak/data/import:ro
    networks:
      - default
      - minuseek
    depends_on:
      keycloak-db:
        condition: service_healthy

  keycloak-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER} -d ${KC_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  keycloak_data:

networks:
  minuseek:
    external: true
